services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: eu_comply
      POSTGRES_USER: eu_comply
      POSTGRES_PASSWORD: eu_comply
    ports:
      - "${EU_COMPLY_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eu_comply -d eu_comply"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${EU_COMPLY_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: eucomply
      MINIO_ROOT_PASSWORD: eucomply123
    ports:
      - "${EU_COMPLY_MINIO_PORT:-9000}:9000"
      - "${EU_COMPLY_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      EU_COMPLY_DATABASE_URL: postgresql+asyncpg://eu_comply:eu_comply@postgres:5432/eu_comply
      EU_COMPLY_REDIS_URL: redis://redis:6379/0
      EU_COMPLY_ARTIFACT_STORAGE_PATH: /var/lib/eu-comply/artifacts
      EU_COMPLY_AUTO_CREATE_SCHEMA: "false"
      EU_COMPLY_BOOTSTRAP_ADMIN_PASSWORD: change-me-now
      EU_COMPLY_BOOTSTRAP_API_CLIENT_SECRET: eu-comply-dev-secret
      EU_COMPLY_OPENROUTER_API_KEY: ${EU_COMPLY_OPENROUTER_API_KEY:-}
      EU_COMPLY_OLLAMA_BASE_URL: ${EU_COMPLY_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    command:
      [
        "sh",
        "-c",
        "uv run alembic upgrade head && uv run uvicorn eu_comply_api.main:app --host 0.0.0.0 --port 8000 --app-dir src",
      ]
    ports:
      - "${EU_COMPLY_API_PORT:-8000}:8000"
    volumes:
      - artifact-data:/var/lib/eu-comply/artifacts

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    depends_on:
      api:
        condition: service_started
    ports:
      - "${EU_COMPLY_WEB_PORT:-3000}:3000"

volumes:
  postgres-data:
  minio-data:
  artifact-data:

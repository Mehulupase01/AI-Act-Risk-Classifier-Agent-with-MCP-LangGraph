services:
  postgres:
    image: postgres:17
    container_name: eu-comply-postgres
    environment:
      POSTGRES_DB: eu_comply
      POSTGRES_USER: eu_comply
      POSTGRES_PASSWORD: eu_comply
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eu_comply -d eu_comply"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: eu-comply-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: eu-comply-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: eucomply
      MINIO_ROOT_PASSWORD: eucomply123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  minio-data:
